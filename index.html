<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoAI & GIS Portfolio</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .hero {
      background: linear-gradient(135deg, #1f2937, #111827);
      color: white;
      text-align: center;
      padding: 64px 20px 48px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }

    .hero .name {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .hero .subtitle {
      font-size: 18px;
      color: #d1d5db;
      margin: 0;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .section h2 {
      text-align: center;
      font-size: 34px;
      margin-top: 0;
      margin-bottom: 36px;
    }

    .project-card {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .project-image img {
      width: 100%;
      height: 100%;
      min-height: 320px;
      object-fit: cover;
      display: block;
    }

    .project-content {
      padding: 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .project-content h3 {
      margin: 0 0 16px;
      font-size: 30px;
      line-height: 1.2;
    }

    .project-content p {
      margin: 0 0 22px;
      line-height: 1.7;
      color: #374151;
      font-size: 17px;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 600;
      width: fit-content;
    }

    .button:hover {
      background: #1d4ed8;
    }

    @media (max-width: 900px) {
      .project-card {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 34px;
      }

      .project-content {
        padding: 24px;
      }

      .project-content h3 {
        font-size: 24px;
      }

      .project-image img {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>

  <header class="hero">
    <h1>GeoAI & GIS Portfolio</h1>
    <div class="name">Sophia (Zahra) Chehreghan</div>
    <p class="subtitle">Urban Planner | Spatial Analysis | GeoAI</p>
  </header>

  <section class="section">
    <h2>Projects</h2>

    <div class="project-card">
      <div class="project-image">
        <img src="images/textsam-boat-detection/boat detection.png" alt="Detect Objects with TextSAM">
      </div>

      <div class="project-content">
        <h3>Detect Objects with TextSAM</h3>
        <p>
          Object detection in high-resolution aerial imagery using the TextSAM model in ArcGIS Pro.
        </p>

        <a class="button" href="#">View Project</a>
      </div>
    </div>
  </section>

</body>
</html>
