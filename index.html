<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoAI & GIS Portfolio</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .hero {
      background: linear-gradient(135deg, #1f2937, #111827);
      color: white;
      text-align: center;
      padding: 64px 20px 48px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }

    .hero .name {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .hero .subtitle {
      font-size: 18px;
      color: #d1d5db;
      margin: 0;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .section h2 {
      text-align: center;
      font-size: 34px;
      margin-top: 0;
      margin-bottom: 36px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 28px;
    }

    .project-card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    }

    .project-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .project-content {
      padding: 20px;
    }

    .project-content h3 {
      margin: 0 0 12px;
      font-size: 26px;
    }

    .project-content p {
      margin: 0 0 16px;
      line-height: 1.6;
      color: #374151;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tag {
      background: #e5e7eb;
      color: #111827;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
    }

    .button:hover {
      background: #1d4ed8;
    }

    @media (max-width: 900px) {
      .project-grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 34px;
      }

      .project-content h3 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <header class="hero">
    <h1>GeoAI & GIS Portfolio</h1>
    <div class="name">Sophia (Zahra) Chehreghan</div>
    <p class="subtitle">Urban Planner | Spatial Analysis | GeoAI</p>
  </header>

  <section class="section">
    <h2>Projects</h2>

    <div class="project-grid">
      <div class="project-card">
        <img src="images/textsam-boat-detection/boat detection.png" alt="Boat Detection with TextSAM" />

        <div class="project-content">
          <h3>Boat Detection with TextSAM</h3>
          <p>
            Deep learning object detection applied to high-resolution aerial imagery using the TextSAM model in ArcGIS Pro.
          </p>

          <div class="tags">
            <span class="tag">ArcGIS Pro</span>
            <span class="tag">GeoAI</span>
            <span class="tag">Object Detection</span>
          </div>

          <a class="button" href="#">View Project</a>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
