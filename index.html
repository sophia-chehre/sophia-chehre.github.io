<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoAI & GIS Portfolio | Sophia (Zahra) Chehreghan</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #111827;
      --muted: #4b5563;
      --muted-light: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --hero-start: #0f172a;
      --hero-end: #111827;
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --max-width: 1240px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }

    a {
      color: inherit;
    }

    .container {
      width: min(var(--max-width), calc(100% - 40px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.9);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 20px;
      min-height: 68px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav a {
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.2s ease;
    }

    .nav a:hover {
      color: var(--accent);
    }

    /* ✅ فقط اینجا تغییر داده شده */
    .nav a.active {
      color: var(--accent);
    }

    .hero {
      background: linear-gradient(135deg, var(--hero-start), var(--hero-end));
      color: white;
      padding: 88px 0 72px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 34px;
      align-items: start;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #dbeafe;
    }

    .hero h1 {
      margin: 0 0 16px;
      font-size: 48px;
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    .hero .name {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
    }

    .hero .subtitle {
      margin: 0 0 20px;
      max-width: 760px;
      font-size: 19px;
      color: #d1d5db;
    }

    .hero .intro {
      margin: 0;
      max-width: 760px;
      font-size: 17px;
      color: #cbd5e1;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    .button,
    .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .button {
      background: var(--accent);
      color: white;
      border: 1px solid var(--accent);
    }

    .button:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
      transform: translateY(-1px);
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.04);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .button-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }

    .hero-panel {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius-xl);
      padding: 24px;
    }

    .hero-panel h2 {
      margin: 0 0 16px;
      font-size: 18px;
      color: #ffffff;
    }

    .hero-panel p {
      margin: 0 0 18px;
      font-size: 15px;
      color: #d1d5db;
    }

    .skill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-chip {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 13px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .section {
      padding: 64px 0;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .section-description {
      margin: 0;
      max-width: 760px;
      font-size: 17px;
      color: var(--muted);
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-top: 26px;
    }

    .overview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .overview-label {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--accent);
    }

    .overview-card h3 {
      margin: 0 0 10px;
      font-size: 19px;
      line-height: 1.25;
    }

    .overview-card p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .projects-wrap {
      display: grid;
      gap: 22px;
      margin-top: 26px;
    }

    .project-card {
      display: grid;
      grid-template-columns: 1.05fr 1.25fr;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .project-image {
      position: relative;
      min-height: 320px;
      background: #dfe4ea;
    }

    .project-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .project-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.82);
      color: #f9fafb;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .project-content {
      padding: 28px 30px 30px;
    }

    .project-meta {
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
    }

    .project-content h3 {
      margin: 0 0 14px;
      font-size: 30px;
    }

    .project-summary {
      margin: 0 0 18px;
      font-size: 16px;
      color: var(--muted);
    }

    .project-highlights {
      margin: 0 0 18px;
      padding-left: 18px;
      color: var(--muted);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .tag {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }

    .project-link {
      padding: 12px 18px;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }

    .footer {
      padding: 24px 0 48px;
      text-align: center;
      color: var(--muted-light);
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="container topbar-inner">
      <nav class="nav">
        <a class="active" href="index.html">Portfolio</a>
        <a href="cv.html">CV</a>
      </nav>
    </div>
  </header>

  <!-- بقیه کدت بدون تغییر -->

</body>
</html>
